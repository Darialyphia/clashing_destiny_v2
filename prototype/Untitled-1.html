            e.preventDefault();
          keys[k] = true;

          if ((k === "e" || k === "q") && state === "playing" && !e.repeat)
            doParry();
          if (
            (k === " " || k === "shift" || k === "f") &&
            state === "playing" &&
            !e.repeat

            doDash();
          if (state !== "playing") {
            if (k === "r" || k === " " || k === "enter") tapAdvance();
          }
          if (state === "select" && (k === "1" || k === "2"))
            chooseChar(+k - 1);
          else if (state === "levelup" && (k === "1" || k === "2"))
            chooseItem(+k - 1);
          else if (
            state === "levelintro" &&
            (k === "1" || k === "2" || k === "3")

            startLevel(+k - 1); // level select (preview)
        });
        addEventListener("keyup", (e) => {
          const k = e.key.toLowerCase();
          keys[k] = false;
        });
        function ptPos(e) {
          const r = cv.getBoundingClientRect();
          return {
            x: ((e.clientX - r.left) / r.width) * W,
            y: ((e.clientY - r.top) / r.height) * H,
          };
        }
        cv.addEventListener("contextmenu", (e) => e.preventDefault());
        cv.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          cv.setPointerCapture?.(e.pointerId);
          resumeAudio();
          const p = ptPos(e);
          if (state === "select") {
            chooseChar(p.y < 415 ? 0 : 1);
            return;
          }
          if (state === "levelup") {
            chooseItem(p.y < 415 ? 0 : 1);
            return;
          }
          if (state !== "playing") {
            tapAdvance();
            return;
          }
          if (e.pointerType === "mouse") {
            mouse = { x: p.x, y: p.y, has: true };
            if (e.button === 2) {
              doParry();
              return;
            }
            if (e.button === 0) startCharge();
            return;
          }
          if (Math.hypot(p.x - PBX, p.y - PBY) < PBR + 6) {
            doParry();
            return;
          } // touch parry button
          if (Math.hypot(p.x - DBX, p.y - DBY) < DBR + 6) {
            doDash();
            return;

          if (p.x < W / 2 && !moveStick) {
            moveStick = { id: e.pointerId, ox: p.x, oy: p.y, x: p.x, y: p.y };
          } else if (!aimStick) {
            aimStick = { id: e.pointerId, ox: p.x, oy: p.y, x: p.x, y: p.y };
            startCharge();
          }
        });
        cv.addEventListener("pointermove", (e) => {
          const p = ptPos(e);
          if (e.pointerType === "mouse") {
            mouse = { x: p.x, y: p.y, has: true };
            return;
          }
          if (moveStick && e.pointerId === moveStick.id) {
            moveStick.x = p.x;
            moveStick.y = p.y;
          }
          if (aimStick && e.pointerId === aimStick.id) {
            aimStick.x = p.x;
            aimStick.y = p.y;
          }

        let AC = null;
        function ac() {
          if (!AC) {
            try {
              AC = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {}
          }
          return AC;
        }
        function resumeAudio() {
          const c = ac();
          if (c && c.state === "suspended") c.resume();
        }
        function noiseBurst(dur, freq, q, vol, type) {
          const c = ac();
          if (!c) return;
          const t = c.currentTime;
          const n = Math.max(1, Math.floor(c.sampleRate * dur));
          const buf = c.createBuffer(1, n, c.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
          const src = c.createBufferSource();
          src.buffer = buf;
          const f = c.createBiquadFilter();
          f.type = type || "bandpass";
          f.frequency.value = freq;
          f.Q.value = q || 1;
          const g = c.createGain();
          g.gain.setValueAtTime(vol, t);
          g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
          src.connect(f);
          f.connect(g);
          g.connect(c.destination);
          src.start(t);
          src.stop(t + dur);
        }
        function tone(freq, dur, vol, type) {
          const c = ac();
          if (!c) return;
          const t = c.currentTime;
          const o = c.createOscillator();
          o.type = type || "sine";
          o.frequency.value = freq;
          const g = c.createGain();
          g.gain.setValueAtTime(vol, t);
          g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
          o.connect(g);
          g.connect(c.destination);
          o.start(t);
          o.stop(t + dur);
        }
        function sweep(f0, f1, dur, vol, type) {
          const c = ac();
          if (!c) return;
          const t = c.currentTime;
          const o = c.createOscillator();
          o.type = type || "sine";
          o.frequency.setValueAtTime(f0, t);
          o.frequency.exponentialRampToValueAtTime(f1, t + dur);
          const g = c.createGain();
          g.gain.setValueAtTime(0.0008, t);
          g.gain.linearRampToValueAtTime(vol, t + dur * 0.6);
          g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
          o.connect(g);
          g.connect(c.destination);
          o.start(t);
          o.stop(t + dur);
        }

        function chooseChar(i) {

        const boss = {

        function startCharge() {

        function spawnBurst(x, y, color, n) {

        // ---------- Boss attacks ----------
        function bossThrow(aim, speedMul = 1, homing = false) {
          const c = boss.cfg,
            sp = c.ballSpeed * speedMul,

          const base = aim
            ? Math.atan2(player.y - boss.y, player.x - boss.x)

              x: boss.x,

              vx: Math.cos(a) * sp,

        // ---------- Player parry ----------
        function doParry() {
          if (state !== "playing" || player.parryCd > 0) return;
          player.parry = PARRY_WINDOW;
          player.parryCd = PARRY_CD;
          sfxParry();

        // ---------- Player dash (i-frames) ----------
        function doDash() {
          if (state !== "playing" || player.dashCd > 0 || player.dash > 0)
            return;
          let dx = 0,
            dy = 0;
          if (keys["arrowleft"] || keys["a"]) dx -= 1;
          if (keys["arrowright"] || keys["d"]) dx += 1;
          if (keys["arrowup"] || keys["w"]) dy -= 1;
          if (keys["arrowdown"] || keys["s"]) dy += 1;
          if (moveStick) {
            const sx = moveStick.x - moveStick.ox,
              sy = moveStick.y - moveStick.oy;
            if (Math.hypot(sx, sy) > 6) {
              dx += sx;
              dy += sy;
            }
          }
          if (dx === 0 && dy === 0) {
            dx = player.dashX;
            dy = player.dashY;
          } // reuse last facing
          const d = Math.hypot(dx, dy) || 1;
          player.dashX = dx / d;
          player.dashY = dy / d;
          player.dash = DASH_TIME;
          player.dashCd = DASH_CD;
          sfxDash();
          spawnBurst(player.x, player.y, "#bfe8ff", 12);
        }

        // ---------- Boss bat rush (L1) ----------
        function updateBat(dt) {
          const c = boss.cfg,
            toP = Math.atan2(player.y - boss.y, player.x - boss.x);
          if (boss.batState === "idle") {
            boss.batT -= dt * 1000;
            if (boss.batT <= 0) {
              boss.batState = "windup";
              boss.batPhase = 0.55;
              boss.batHit = false;
              toast("BAT RUSH!");
              taunt("ult");
              boss.gloat = 0;
            }
          } else if (boss.batState === "windup") {
            boss.batPhase -= dt;
            boss.batAngle = toP - 2.2 + Math.sin(now() / 40) * 0.12;
            if (boss.batPhase <= 0) {
              boss.batState = "rush";
              boss.batPhase = 0.75;
            }
          } else if (boss.batState === "rush") {
            boss.batPhase -= dt;
            boss.batAngle = toP - 1.6;
            if (
              Math.hypot(player.x - boss.x, player.y - boss.y) <
                c.size * 1.35 + player.r ||
              boss.batPhase <= 0
            ) {
              boss.batState = "swing";
              boss.batPhase = 0.3;
              sfxBatWhoosh();
            }
          } else if (boss.batState === "swing") {
            boss.batPhase -= dt;
            const p = 1 - clamp(boss.batPhase / 0.3, 0, 1);
            boss.batAngle = lerp(toP - 1.6, toP + 1.0, p);
            if (!boss.batHit && p > 0.22 && p < 0.8) {
              const reach = c.size * 1.7 + player.r;
              if (
                player.inv <= 0 &&
                player.dash <= 0 &&
                Math.hypot(player.x - boss.x, player.y - boss.y) < reach
              ) {
                boss.batHit = true;
                const dmg =
                  player.maxHp * 0.5 * Math.max(0.7, player.takenMult);
                player.hp -= dmg;
                player.hurt = 0.6;
                boss.gloat = 0.9;
                player.inv = IFRAMES;
                shake = 16;
                flash = 0.35;
                flashColor = "255,120,90";
                hitStop = 90;
                spawnBurst(player.x, player.y, "#ffb15a", 18);
                floatDmg(player.x, player.y, Math.round(dmg), true);
                sfxBat();
                play(sfxHit);
                taunt("hit");
              }
            }
            if (boss.batPhase <= 0) {
              boss.batState = "idle";
              boss.batT = c.batEvery * rand(0.85, 1.3);
            }
          }
        }

        // ---------- Hazards (grenades / missiles) ----------
        function explode(hz) {
          spawnBurst(
            hz.x,
            hz.y,
            hz.kind === "missile" ? "#ffb15a" : "#ff8a5a",
            22,
          );
          shake = Math.max(shake, 10);
          flash = Math.max(flash, 0.22);
          flashColor = "255,150,80";
          hitStop = Math.max(hitStop, 24);
          sfxExplosion();
          const d = Math.hypot(player.x - hz.x, player.y - hz.y);
          if (d < hz.r && player.dash <= 0) {
            const dmg = hz.dmg * (1 - (0.5 * d) / hz.r); // linear falloff to 50% at the edge (dash phases through)
            player.hp -= dmg * player.takenMult;
            player.hurt = 0.5;
            boss.gloat = 0.6;
            player.inv = Math.max(player.inv, 160);
            floatDmg(player.x, player.y, Math.round(dmg), true);
            play(sfxHit);
          }
        }
        function updateHazards(dt) {
          for (const hz of hazards) {
            if (hz.phase === "delay") {
              hz.delay -= dt;
              if (hz.delay <= 0) {
                hz.phase = "fly";
                hz.t = 0;
              }
              continue;
            }
            if (hz.phase === "fly") {
              hz.t += dt;
              const f = clamp(hz.t / hz.travel, 0, 1);
              hz.x = lerp(hz.sx, hz.tx, f);
              hz.y = lerp(hz.sy, hz.ty, f) - Math.sin(f * Math.PI) * hz.arc;
              if (f >= 1) {
                hz.phase = "fuse";
                hz.fuseT = hz.fuse;
                hz.x = hz.tx;
                hz.y = hz.ty;
              }
              continue;
            }
            if (hz.phase === "fuse") {
              hz.fuseT -= dt;
              if (hz.fuseT <= 0) {
                hz.phase = "boom";
                hz.boom = 0;
                explode(hz);
              }
              continue;
            }
            if (hz.phase === "boom") {
              hz.boom += dt;
              if (hz.boom >= 0.4) hz.dead = true;
            }
          }
          hazards = hazards.filter((h) => !h.dead);
        }

        // ---------- Loop ----------
        let last = now();
        function loop() {
          const t = now();
          let dt = (t - last) / 1000;
          last = t;
          if (dt > 0.05) dt = 0.05;
          if (hitStop > 0) {
            hitStop -= dt * 1000;
            dt *= 0.15;
          }
          update(dt);
          render();
          requestAnimationFrame(loop);
        }

        function update(dt) {
          for (const f of snow) {
            f.y += f.s * dt;
            if (f.y > H) {
              f.y = -5;
              f.x = rand(0, W);
            }
          }
          for (const p of particles) {
            p.t += dt;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += 200 * dt;
          }
          particles = particles.filter((p) => p.t < p.life);
          for (const m of emotes) {
            m.t += dt;
            m.y += m.vy * dt;
            m.vy += 40 * dt;
          }
          emotes = emotes.filter((m) => m.t < m.life);
          if (bossSpeech) {
            bossSpeech.t += dt;
            if (bossSpeech.t >= bossSpeech.life) bossSpeech = null;
          }
          if (speechCd > 0) speechCd -= dt * 1000;
          if (missSfxCd > 0) missSfxCd -= dt * 1000;
          if (shake > 0) shake = Math.max(0, shake - 40 * dt);
          if (flash > 0) flash = Math.max(0, flash - dt);
          if (msgTimer > 0) msgTimer -= dt;
          if (player.hurt > 0) player.hurt -= dt;
          if (player.gloat > 0) player.gloat -= dt;
          if (player.inv > 0) player.inv -= dt * 1000;
          if (boss.hurt > 0) boss.hurt -= dt;
          if (boss.gloat > 0) boss.gloat -= dt;
          if (state !== "playing") return;

          // idle flex
          emoteT -= dt * 1000;
          if (emoteT <= 0) {
            emoteT = rand(2200, 4200);
            emote();
            if (Math.random() < 0.5) taunt("idle");
          }

          // move
          let mx = 0,
            my = 0;
          if (keys["arrowleft"] || keys["a"]) mx -= 1;
          if (keys["arrowright"] || keys["d"]) mx += 1;
          if (keys["arrowup"] || keys["w"]) my -= 1;
          if (keys["arrowdown"] || keys["s"]) my += 1;
          if (moveStick) {
            const dx = moveStick.x - moveStick.ox,
              dy = moveStick.y - moveStick.oy,
              d = Math.hypot(dx, dy);
            if (d > 6) {
              const m = Math.min(1, d / 55);
              mx += (dx / d) * m;
              my += (dy / d) * m;
            }
          }
          const ml = Math.hypot(mx, my);
          if (ml > 1) {
            mx /= ml;
            my /= ml;
          }
          if (player.dash > 0) {
            player.x = clamp(
              player.x + player.dashX * DASH_SPEED * dt,
              player.r,
              W - player.r,
            );
            player.y = clamp(
              player.y + player.dashY * DASH_SPEED * dt,
              ARENA_TOP + player.r,
              ARENA_BOT - player.r,
            );
          } else {
            const spd = player.speed * (player.charging ? CHARGE_MOVE_MULT : 1);
            if (ml > 0.01) {
              const fm = Math.hypot(mx, my) || 1;
              player.dashX = mx / fm;
              player.dashY = my / fm;
            } // remember facing for a standing dash
            player.x = clamp(player.x + mx * spd * dt, player.r, W - player.r);
            player.y = clamp(
              player.y + my * spd * dt,
              ARENA_TOP + player.r,
              ARENA_BOT - player.r,
            );
          }

          // aim
          if (aimStick) {
            const dx = aimStick.x - aimStick.ox,
              dy = aimStick.y - aimStick.oy;
            if (Math.hypot(dx, dy) > 8) player.aim = Math.atan2(dy, dx);
          } else
            player.aim = Math.atan2(mouse.y - player.y, mouse.x - player.x);

          if (player.charging)
            player.charge = Math.min(
              1,
              player.charge + (dt * 1000) / player.chargeTime,
            );
          if (player.cooldown > 0) player.cooldown -= dt * 1000;
          if (player.parry > 0) player.parry -= dt;
          if (player.parryCd > 0) player.parryCd -= dt * 1000;
          if (player.dash > 0) player.dash -= dt;
          if (player.dashCd > 0) player.dashCd -= dt * 1000;
          if (boss.wpnT > 0) boss.wpnT -= dt;

          // boss AI
          const c = boss.cfg;
          const batBusy = c.bat && boss.batState !== "idle";
          if (!batBusy) {
            boss.retarget -= dt * 1000;
            if (boss.retarget <= 0) {
              boss.retarget = rand(700, 1500);
              boss.tx = rand(c.size, W - c.size);
              boss.ty = clamp(
                rand(H * c.roamTop, H * c.roamBot),
                ARENA_TOP + c.size,
                H * c.roamBot,
              );
            }
            let dodge = 0;
            if (c.dash) {
              for (const b of balls) {
                if (b.owner === "player") {
                  const dx = b.x - boss.x,
                    dy = b.y - boss.y;
                  if (Math.abs(dy) < 170 && Math.abs(dx) < c.size * 1.1) {
                    dodge += (dx > 0 ? -1 : 1) * c.moveSpeed * 1.7;
                    if (Math.random() < 0.02) emote("💨");
                  }
                }
              }
            }
            let bx = boss.tx - boss.x,
              by = boss.ty - boss.y;
            const bd = Math.hypot(bx, by) || 1;
            boss.x += ((bx / bd) * c.moveSpeed + dodge) * dt;
            boss.y += (by / bd) * c.moveSpeed * dt;
            boss.x = clamp(boss.x, c.size * 0.7, W - c.size * 0.7);
            boss.y = clamp(
              boss.y,
              ARENA_TOP + c.size * 0.5,
              H * c.roamBot + 40,
            );
            if (c.teleport) {
              boss.teleT -= dt * 1000;
              if (boss.teleT <= 0) {
                boss.teleT = rand(2400, 3800);
                spawnBurst(boss.x, boss.y, "#b98bff", 12);
                boss.x = rand(c.size, W - c.size);
                boss.y = rand(ARENA_TOP + c.size, H * c.roamBot);
                spawnBurst(boss.x, boss.y, "#b98bff", 12);
              }
            }
          }
          if (c.bat) {
            if (boss.batState === "rush") {
              const a = Math.atan2(player.y - boss.y, player.x - boss.x),
                sp = c.moveSpeed * 3.8;
              boss.x = clamp(
                boss.x + Math.cos(a) * sp * dt,
                c.size * 0.7,
                W - c.size * 0.7,
              );
              boss.y = clamp(
                boss.y + Math.sin(a) * sp * dt,
                ARENA_TOP + c.size * 0.5,
                ARENA_BOT - c.size * 0.4,
              );
            }
            updateBat(dt);
          }

          boss.throwT -= dt * 1000;
          if (boss.throwT <= 0) {
            boss.throwT = c.throwEvery * boss.throwMul * rand(0.85, 1.2);
            bossThrow(true, 1, !!c.teleport && Math.random() < 0.45);
          }

          // Special weapons (L2 grenades · L3 AK / AWP / rockets)
          if (c.grenade) {
            boss.grenadeT -= dt * 1000;
            if (boss.grenadeT <= 0) {
              boss.grenadeT = c.grenadeEvery * rand(0.8, 1.35);
              lobGrenade();
            }
          }
          if (c.ak) {
            boss.akT -= dt * 1000;
            if (boss.akT <= 0) {
              boss.akT = c.akEvery * rand(0.8, 1.35);
              akBurst();
            }
          }
          if (c.rockets) {
            boss.rocketT -= dt * 1000;
            if (boss.rocketT <= 0) {
              boss.rocketT = c.rocketEvery * rand(0.85, 1.3);
              rocketBarrage();
            }
          }
          if (c.awp) {
            if (boss.awpState === "aim") {
              boss.awpAimT -= dt * 1000;
              if (boss.awpAimT <= 0) {
                fireAwp();
                boss.awpState = "idle";
              }
            } else {
              boss.awpT -= dt * 1000;
              if (boss.awpT <= 0) {
                boss.awpT = c.awpEvery * rand(0.9, 1.35);
                startAwp();
              }
            }
          }
          updateHazards(dt);

          // Penguin Protector: at L3 half-HP, a support locks on and slowly heals the boss
          if (
            level === 2 &&
            !boss.buffed &&
            boss.hp > 0 &&
            boss.hp <= boss.maxHp * 0.5
          ) {
            boss.buffed = true;
            boss.throwMul = 0.82;
            protector.active = true;
            protector.t = 0;
            flash = 0.6;
            flashColor = "140,255,180";
            shake = 14;
            hitStop = 140;
            toast("PENGUIN PROTECTOR!");
            taunt("ult");
            emote("💚");
          }
          if (protector.active) {
            boss.hp = Math.min(boss.maxHp, boss.hp + protector.healRate * dt);
            protector.t += dt;
          }

          boss.ultT -= dt * 1000;
          boss.ultCharge = 1 - clamp(boss.ultT / c.ultEvery, 0, 1);
          if (boss.telegraph > 0) {
            boss.telegraph -= dt * 1000;
            if (boss.telegraph <= 0) doUltimate();
          } else if (boss.ultT <= 0) {
            boss.ultT = c.ultEvery * rand(0.9, 1.15);
            boss.telegraph = 700;
            flash = 0.22;
            flashColor = c.tint.replace("#", "");
          }

          // balls
          for (const b of balls) {
            if (b.homing && b.owner === "boss") {
              const dx = player.x - b.x,
                dy = player.y - b.y,
                d = Math.hypot(dx, dy) || 1;
              b.vx += ((dx / d) * 300 - b.vx) * 1.4 * dt;
              b.vy += ((dy / d) * 300 - b.vy) * 1.4 * dt;
            }
            b.x += b.vx * dt;
            b.y += b.vy * dt;

            // Rubber Ricochet: player balls bank off the arena walls
            if (b.owner === "player" && b.bounces > 0 && !b.dead) {
              let bounced = false;
              if (b.x < 6 + b.r) {
                b.x = 6 + b.r;
                b.vx = Math.abs(b.vx);
                bounced = true;
              } else if (b.x > W - 6 - b.r) {
                b.x = W - 6 - b.r;
                b.vx = -Math.abs(b.vx);
                bounced = true;
              }
              if (b.y < ARENA_TOP + b.r) {
                b.y = ARENA_TOP + b.r;
                b.vy = Math.abs(b.vy);
                bounced = true;
              }
              if (bounced) {
                b.bounces--;
                spawnBurst(b.x, b.y, "#bfe3ff", 5);
              }
            }

            if (b.owner === "player" && !b.dead) {
              const d = Math.hypot(b.x - boss.x, b.y - boss.y);
              if (d < c.size * 0.75 + b.r) {
                const catchP = c.catchBase * Math.max(0, 1 - b.charge * 1.25);
                if (Math.random() < catchP) {
                  b.owner = "boss";
                  b.caught = true;
                  b.dmg = Math.max(16, b.dmg * 0.9);
                  const dx = player.x - boss.x,
                    dy = player.y - boss.y,
                    dd = Math.hypot(dx, dy) || 1,
                    sp = c.ballSpeed * 1.3;
                  b.vx = (dx / dd) * sp;
                  b.vy = (dy / dd) * sp;
                  b.homing = !!c.teleport && Math.random() < 0.4;
                  spawnBurst(boss.x, boss.y, "#ffe08a", 10);
                  shake = 6;
                  taunt("catch");
                  emote("🎁");
                } else {
                  b.dead = true;
                  boss.hp -= b.dmg;
                  boss.hurt = 0.5;
                  player.gloat = 0.7;
                  shake = 4 + b.charge * 8;
                  hitStop = b.charge > 0.9 ? 70 : 30;
                  spawnBurst(
                    b.x,
                    b.y,
                    "#bfe3ff",
                    8 + Math.round(b.charge * 12),
                  );
                  flash = 0.1 + b.charge * 0.12;
                  flashColor = "200,230,255";
                  floatDmg(b.x, b.y, Math.round(b.dmg), b.charge > 0.9);
                  if (Math.random() < 0.28) taunt("hurt");
                }
              }
            }
            if (b.owner === "boss" && !b.dead) {
              const dp = Math.hypot(b.x - player.x, b.y - player.y);
              // PARRY: catch during the window → reflect back at 2x speed (negates AWP too)
              if (player.parry > 0 && dp < player.r + b.r + 18) {
                b.owner = "player";
                b.parried = true;
                b.charge = 1;
                b.type = null;
                b.homing = false;
                b.bounces = 0;
                const dx = boss.x - player.x,
                  dy = boss.y - player.y,
                  dd = Math.hypot(dx, dy) || 1,
                  sp = Math.hypot(b.vx, b.vy) * 2;
                b.vx = (dx / dd) * sp;
                b.vy = (dy / dd) * sp;
                b.dmg = b.instakill ? 70 : Math.max(24, b.dmg * 1.5);
                b.instakill = false;
                spawnBurst(player.x, player.y, "#ffe08a", 16);
                flash = Math.max(flash, 0.14);
                flashColor = "180,240,255";
                shake = Math.max(shake, 6);
                hitStop = Math.max(hitStop, 40);
                sfxParry();
                toast("PARRY!");
                player.gloat = 0.7;
                player.parry = 0;
                continue; // one projectile only
              }
              if (player.inv <= 0 && dp < player.r + b.r * 0.7) {
                b.dead = true;
                if (b.instakill) {
                  player.hp = 0;
                  player.hurt = 0.7;
                  boss.gloat = 1.0;
                  shake = 16;
                  flash = 0.5;
                  flashColor = "255,40,40";
                  hitStop = 120;
                  spawnBurst(player.x, player.y, "#ff5555", 18);
                  toast("HEADSHOT!");
                  taunt("hit");
                  play(sfxHit);
                } else {
                  player.hp -= b.dmg * player.takenMult;
                  player.hurt = 0.55;
                  boss.gloat = 0.8;
                  player.inv = IFRAMES;
                  shake = 10;
                  flash = 0.2;
                  flashColor = "255,110,110";
                  hitStop = 50;
                  spawnBurst(player.x, player.y, "#ff8a8a", 12);
                  taunt("hit");
                  emote();
                  play(sfxHit);
                }
              }
            }
            if (
              b.x < -40 ||
              b.x > W + 40 ||
              b.y < ARENA_TOP - 60 ||
              b.y > H + 40
            ) {
              if (b.owner === "player" && b.y < ARENA_TOP - 40) {
                if (Math.random() < 0.4) taunt("dodge");
                if (missSfxCd <= 0) {
                  play(sfxMiss);
                  missSfxCd = 650;
                }
              }
              b.dead = true;
            }
          }
          balls = balls.filter((b) => !b.dead);

          if (boss.hp <= 0) {
            boss.hp = 0;
            spawnBurst(boss.x, boss.y, "#fff", 40);
            shake = 14;
            flash = 0.6;
            flashColor = "255,255,255";
            hitStop = 140;
            state = "levelclear";
          }
          if (player.hp <= 0) {
            player.hp = 0;
            state = "gameover";
            shake = 14;
            flash = 0.5;
            flashColor = "255,80,80";
            hitStop = 140;
            cv.style.filter = "grayscale(1) brightness(0.72)";
            playOnce(sfxWasted);
          }
        }

        // ---------- Render ----------
        function render() {
          ctx.save();
          if (shake > 0)
            ctx.translate(rand(-shake, shake), rand(-shake, shake));
          const g = ctx.createLinearGradient(0, 0, 0, H);
          const themes = [
            ["#12233a", "#0b1622"],
            ["#102a3f", "#0a1420"],
            ["#1a1030", "#0a0716"],
          ];
          const th = themes[level] || themes[0];
          g.addColorStop(0, th[0]);
          g.addColorStop(1, th[1]);
          ctx.fillStyle = g;
          ctx.fillRect(-20, -20, W + 40, H + 40);

          ctx.strokeStyle = "rgba(255,255,255,.08)";
          ctx.lineWidth = 2;
          ctx.strokeRect(6, ARENA_TOP, W - 12, ARENA_BOT - ARENA_TOP);
          ctx.fillStyle = "rgba(255,255,255,.04)";
          ctx.fillRect(6, ARENA_TOP, W - 12, ARENA_BOT - ARENA_TOP);

          ctx.fillStyle = "rgba(255,255,255,.7)";
          for (const f of snow) {
            ctx.beginPath();
            ctx.arc(f.x, f.y, f.r, 0, TAU);
            ctx.fill();
          }

          if (state === "menu") {
            drawMenu();
            ctx.restore();
            return;
          }
          if (state === "select") {
            drawSelect();
            ctx.restore();
            return;
          }

          drawBoss();
          drawAim();
          drawPlayer();
          drawProtector();
          drawHazards();

          for (const b of balls) {
            if (b.type === "ak" || b.type === "awp") {
              const vlen = Math.hypot(b.vx, b.vy) || 1,
                tl = b.type === "awp" ? 28 : 16;
              ctx.strokeStyle =
                b.type === "awp"
                  ? "rgba(255,70,70,.85)"
                  : "rgba(255,170,80,.8)";
              ctx.lineWidth = b.type === "awp" ? 4 : 3;
              ctx.lineCap = "round";
              ctx.beginPath();
              ctx.moveTo(b.x, b.y);
              ctx.lineTo(b.x - (b.vx / vlen) * tl, b.y - (b.vy / vlen) * tl);
              ctx.stroke();
              ctx.lineCap = "butt";
              if (b.type === "awp") {
                ctx.globalAlpha = 0.4;
                ctx.fillStyle = "#ff5555";
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r + 5, 0, TAU);
                ctx.fill();
                ctx.globalAlpha = 1;
              }
              ctx.fillStyle = b.type === "awp" ? "#ff5555" : "#ffcf6a";
              ctx.beginPath();
              ctx.arc(b.x, b.y, b.r, 0, TAU);
              ctx.fill();
              continue;
            }
            ctx.beginPath();
            ctx.fillStyle = b.parried
              ? "#ffe08a"
              : b.owner === "boss"
                ? b.caught
                  ? "#ffd36a"
                  : "#a9d6ff"
                : b.charge > 0.9
                  ? "#ffe08a"
                  : "#eaf6ff";
            ctx.arc(b.x, b.y, b.r, 0, TAU);
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,.6)";
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }
          for (const p of particles) {
            ctx.globalAlpha = clamp(1 - p.t / p.life, 0, 1);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, TAU);
            ctx.fill();
          }
          ctx.globalAlpha = 1;

          // damage numbers
          for (const d of dmgNums) {
            d.t += 1 / 60;
            d.y -= 40 / 60;
            ctx.globalAlpha = clamp(1 - d.t / d.life, 0, 1);
            ctx.fillStyle = d.big ? "#ffe08a" : "#dff0ff";
            ctx.font = (d.big ? "28px " : "22px ") + F_IMPACT;
            ctx.textAlign = "center";
            ctx.fillText(d.n, d.x, d.y);
          }
          ctx.globalAlpha = 1;
          for (let i = dmgNums.length - 1; i >= 0; i--)
            if (dmgNums[i].t >= dmgNums[i].life) dmgNums.splice(i, 1);

          // emotes
          for (const m of emotes) {
            ctx.save();
            ctx.globalAlpha = clamp(1 - m.t / m.life, 0, 1);
            ctx.translate(m.x, m.y);
            ctx.rotate(m.rot * Math.sin(m.t * 6));
            ctx.font = "28px system-ui";
            ctx.textAlign = "center";
            ctx.fillText(m.e, 0, 0);
            ctx.restore();
          }

          drawSpeech();
          drawHUD();
          drawParryUI();
          drawDashUI();

          if (state === "levelup") drawLevelUp();
          if (state === "levelintro") drawIntro();
          if (state === "levelclear")
            drawCenter(
              `${boss.cfg.name} DOWN!`,
              level + 1 < BOSSES.length
                ? "Tap / Space — next penguin"
                : "Tap / Space — finish",
              "#bfe3ff",
            );
          if (state === "gameover")
            drawCenter("YOU GOT ICED", "Tap / R to retry", "#ff8a8a");
          if (state === "win")
            drawCenter(
              "SNOWBALL CHAMPION! 🏆",
              "Tap / R to play again",
              "#ffe08a",
            );

          if (flash > 0) {
            ctx.fillStyle = `rgba(${flashColor},${flash * 0.5})`;
            ctx.fillRect(-20, -20, W + 40, H + 40);
          }

          // in-game watermark
          ctx.globalAlpha = 0.28;
          ctx.fillStyle = "#fff";
          ctx.font = "12px " + F_UI;
          ctx.textAlign = "right";
          ctx.fillText("built by Colin", W - 12, H - 8);
          ctx.globalAlpha = 1;

          ctx.restore();

          if (msgTimer > 0 && msg) {
            ctx.save();
            ctx.globalAlpha = clamp(msgTimer, 0, 1);
            ctx.font = "34px " + F_IMPACT;
            ctx.textAlign = "center";
            ctx.fillStyle = "#fff";
            ctx.strokeStyle = "#12233a";
            ctx.lineWidth = 4;
            ctx.strokeText(msg, W / 2, ARENA_TOP + 170);
            ctx.fillText(msg, W / 2, ARENA_TOP + 170);
            ctx.restore();
          }
        }

        function drawSpeech() {
          if (!bossSpeech || !boss.cfg) return;
          const s = bossSpeech;
          ctx.save();
          ctx.font = "22px " + F_IMPACT;
          ctx.textAlign = "center";
          const tw = ctx.measureText(s.text).width,
            w = Math.max(64, tw + 26),
            h = 34;
          const bx = clamp(boss.x, 10 + w / 2, W - 10 - w / 2),
            by = boss.y - boss.cfg.size - 30;
          const a = clamp(Math.min(s.t / 0.1, (s.life - s.t) / 0.25), 0, 1);
          ctx.globalAlpha = a;
          const sc = s.t < 0.12 ? 1 + ((0.12 - s.t) / 0.12) * 0.25 : 1;
          ctx.translate(bx, by);
          ctx.scale(sc, sc);
          ctx.translate(-bx, -by);
          ctx.fillStyle = "#fff";
          ctx.strokeStyle = "#12233a";
          ctx.lineWidth = 3;
          rr(bx - w / 2, by - h / 2, w, h, 10);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(bx - 7, by + h / 2 - 2);
          ctx.lineTo(bx + 7, by + h / 2 - 2);
          ctx.lineTo(bx, by + h / 2 + 9);
          ctx.closePath();
          ctx.fillStyle = "#fff";
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#12233a";
          ctx.fillText(s.text, bx, by + 7);
          ctx.restore();
        }

        function drawAim() {
          if (state !== "playing") return;
          const len = 40 + player.charge * 120,
            ax = Math.cos(player.aim),
            ay = Math.sin(player.aim);
          ctx.save();
          ctx.setLineDash([6, 7]);
          ctx.lineWidth = 2;
          ctx.strokeStyle =
            player.charge > 0.99
              ? "rgba(255,224,138,.95)"
              : `rgba(180,220,255,${0.35 + player.charge * 0.5})`;
          ctx.beginPath();
          ctx.moveTo(player.x + ax * player.r, player.y + ay * player.r);
          ctx.lineTo(
            player.x + ax * (player.r + len),
            player.y + ay * (player.r + len),
          );
          ctx.stroke();
          ctx.setLineDash([]);
          const tx = player.x + ax * (player.r + len),
            ty = player.y + ay * (player.r + len);
          ctx.fillStyle = player.charge > 0.99 ? "#ffe08a" : "#a9d6ff";
          ctx.beginPath();
          ctx.moveTo(tx, ty);
          ctx.lineTo(tx - ax * 10 - ay * 6, ty - ay * 10 + ax * 6);
          ctx.lineTo(tx - ax * 10 + ay * 6, ty - ay * 10 - ax * 6);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
          if (player.charging || player.charge > 0) {
            ctx.beginPath();
            ctx.strokeStyle = "rgba(0,0,0,.4)";
            ctx.lineWidth = 4;
            ctx.arc(player.x, player.y, player.r + 9, 0, TAU);
            ctx.stroke();
            ctx.beginPath();
            ctx.strokeStyle = player.charge > 0.99 ? "#ffe08a" : "#7fd0ff";
            ctx.lineWidth = 4;
            ctx.arc(
              player.x,
              player.y,
              player.r + 9,
              -Math.PI / 2,
              -Math.PI / 2 + player.charge * TAU,
            );
            ctx.stroke();
          }
        }

        function penguin(x, y, s, cfg, hurt, expr) {
          ctx.save();
          ctx.translate(x, y);
          if (hurt > 0)
            ctx.globalAlpha = 0.5 + 0.5 * Math.abs(Math.sin(hurt * 40));
          ctx.fillStyle = "rgba(0,0,0,.25)";
          ctx.beginPath();
          ctx.ellipse(0, s * 0.95, s * 0.7, s * 0.18, 0, 0, TAU);
          ctx.fill();
          ctx.fillStyle = cfg.body;
          ctx.beginPath();
          ctx.ellipse(0, 0, s * 0.68, s * 0.9, 0, 0, TAU);
          ctx.fill();
          ctx.fillStyle = cfg.belly;
          ctx.beginPath();
          ctx.ellipse(0, s * 0.12, s * 0.44, s * 0.66, 0, 0, TAU);
          ctx.fill();
          ctx.fillStyle = cfg.accent || cfg.body;
          ctx.beginPath();
          ctx.ellipse(-s * 0.62, s * 0.05, s * 0.16, s * 0.5, 0.3, 0, TAU);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(s * 0.62, s * 0.05, s * 0.16, s * 0.5, -0.3, 0, TAU);
          ctx.fill();
          ctx.fillStyle = cfg.beak;
          ctx.beginPath();
          ctx.ellipse(-s * 0.28, s * 0.88, s * 0.18, s * 0.09, 0, 0, TAU);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(s * 0.28, s * 0.88, s * 0.18, s * 0.09, 0, 0, TAU);
          ctx.fill();
          const elx = -s * 0.22,
            erx = s * 0.22,
            ey = -s * 0.28;
          if (expr === "hurt") {
            // dazed X eyes + shocked open mouth
            ctx.strokeStyle = "#12233a";
            ctx.lineWidth = s * 0.06;
            ctx.lineCap = "round";
            for (const cx of [elx, erx]) {
              const r = s * 0.13;
              ctx.beginPath();
              ctx.moveTo(cx - r, ey - r);
              ctx.lineTo(cx + r, ey + r);
              ctx.moveTo(cx + r, ey - r);
              ctx.lineTo(cx - r, ey + r);
              ctx.stroke();
            }
            ctx.fillStyle = "#5a2b2b";
            ctx.beginPath();
            ctx.ellipse(0, s * 0.02, s * 0.12, s * 0.15, 0, 0, TAU);
            ctx.fill();
          } else if (expr === "gloat") {
            // smug happy squint + big grin + tongue
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(elx, ey, s * 0.16, 0, TAU);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(erx, ey, s * 0.16, 0, TAU);
            ctx.fill();
            ctx.strokeStyle = "#12233a";
            ctx.lineWidth = s * 0.055;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.arc(
              elx,
              ey + s * 0.04,
              s * 0.12,
              Math.PI * 1.12,
              Math.PI * 1.88,
            );
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(
              erx,
              ey + s * 0.04,
              s * 0.12,
              Math.PI * 1.12,
              Math.PI * 1.88,
            );
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, -s * 0.04, s * 0.17, Math.PI * 0.12, Math.PI * 0.88);
            ctx.stroke();
            ctx.fillStyle = "#ff7d8a";
            ctx.beginPath();
            ctx.arc(s * 0.05, s * 0.06, s * 0.05, 0, TAU);
            ctx.fill();
          } else {
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(elx, ey, s * 0.16, 0, TAU);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(erx, ey, s * 0.16, 0, TAU);
            ctx.fill();
            ctx.fillStyle = "#12233a";
            ctx.beginPath();
            ctx.arc(-s * 0.19, -s * 0.26, s * 0.08, 0, TAU);
            ctx.fill();
            ctx.beginPath();

        function drawCover(img, dx, dy, dw, dh, focusY) {
          const ir = img.width / img.height,
            dr = dw / dh;
          let sw, sh, sx, sy;

            sh = img.height;
            sw = sh * dr;
            sx = (img.width - sw) / 2;
            sy = 0;
          } else {
            sw = img.width;
            sh = sw / dr;
            sx = 0;
            sy = (img.height - sh) * (focusY ?? 0.5);
          }
          ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
        }

            ctx.globalAlpha = 0.35 + 0.55 * a;
            ctx.lineWidth = 3.5;
            ctx.strokeStyle = "#8fe8ff";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.r + 9 + (1 - a) * 6, 0, TAU);
            ctx.stroke();
            ctx.globalAlpha = 0.15 * a;
            ctx.fillStyle = "#8fe8ff";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.r + 9, 0, TAU);
            ctx.fill();
            ctx.restore();
          }
        }

        function bar(x, y, w, h, frac, col, label, align) {
          ctx.fillStyle = "rgba(255,255,255,.15)";
          ctx.beginPath();
          ctx.roundRect(x, y, w, h, h / 2);
          ctx.fill();
          ctx.fillStyle = col;
          ctx.beginPath();
          ctx.roundRect(x, y, Math.max(0, w * frac), h, h / 2);
          ctx.fill();
          if (label) {
            ctx.fillStyle = "#fff";
            ctx.font = "600 13px " + F_UI;
            ctx.textAlign = align || "left";
            ctx.fillText(label, align === "right" ? x + w : x, y - 5);
          }
        }
        function drawHUD() {
          const c = boss.cfg;
          bar(
            20,
            26,
            W - 40,
            14,
            boss.hp / boss.maxHp,
            "#7fd0ff",
            `${c.name} — ${c.title}`,
          );
          ctx.fillStyle = "rgba(255,255,255,.5)";
          ctx.font = "10px " + F_UI;
          ctx.textAlign = "right";
          ctx.fillText("ULT", W - 24, 58);
          bar(W - 72, 48, 48, 6, boss.ultCharge, "#ffb23e", "");
          bar(
            20,
            H - 26,
            W - 40,
            14,
            player.hp / player.maxHp,
            "#66e06a",
            "You",
            "left",
          );
          ctx.textAlign = "center";
          for (let i = 0; i < BOSSES.length; i++) {
            ctx.fillStyle =
              i < level
                ? "#7fd0ff"
                : i === level
                  ? "#fff"
                  : "rgba(255,255,255,.25)";
            ctx.beginPath();
            ctx.arc(W / 2 - 20 + i * 20, 64, 5, 0, TAU);
            ctx.fill();
          }
        }
        function drawMenu() {
          ctx.textAlign = "center";
          penguin(W / 2, 232, 70, BOSSES[2], 0);
          ctx.fillStyle = "#fff";
          ctx.font = "46px " + F_TITLE;
          ctx.fillText("PENGUIN", W / 2, 388);
          ctx.fillStyle = "#7fd0ff";
          ctx.fillText("DODGEBALL", W / 2, 436);
          ctx.fillStyle = "rgba(255,255,255,.85)";
          ctx.font = "15px " + F_UI;
          ctx.fillText("Charge up, aim, and land the shot.", W / 2, 482);
          ctx.fillText("Full-power throws can't be caught.", W / 2, 504);
          ctx.fillText(
            "You're fragile — dodge in 2D. It gets brutal.",
            W / 2,
            526,
          );
          ctx.fillStyle = "#ffe08a";
          ctx.font = "20px " + F_IMPACT;
          if (Math.floor(now() / 500) % 2)
            ctx.fillText("▶  TAP / SPACE TO START", W / 2, 584);
          ctx.fillStyle = "rgba(255,255,255,.5)";
          ctx.font = "12px " + F_UI;
          ctx.fillText(
            "Desktop: WASD move · aim mouse · hold click to charge · SPACE dash (i-frames) · E/RMB parry",
            W / 2,
            642,
          );
          ctx.fillText(
            "Mobile: left thumb moves · right thumb aims & charges · 💨 dash · 🛡️ parry (bottom-right)",
            W / 2,
            662,
          );
          ctx.fillStyle = "rgba(255,255,255,.75)";
          ctx.font = "16px " + F_IMPACT;
          ctx.fillText("built by Colin", W / 2, 712);
        }
        function drawIntro() {
          const c = boss.cfg;
          ctx.fillStyle = "rgba(6,14,24,.74)";
          ctx.fillRect(0, H / 2 - 180, W, 360);
          ctx.textAlign = "center";
          ctx.fillStyle = "#7fd0ff";
          ctx.font = "15px " + F_IMPACT;
          ctx.fillText(`LEVEL ${level + 1} OF 3`, W / 2, H / 2 - 120);
          ctx.fillStyle = "#fff";
          ctx.font = "34px " + F_TITLE;
          ctx.fillText(c.name, W / 2, H / 2 - 78);
          ctx.fillStyle = "#ffe08a";
          ctx.font = "18px " + F_IMPACT;
          ctx.fillText(c.title, W / 2, H / 2 - 50);
          ctx.fillStyle = "rgba(255,255,255,.88)";
          ctx.font = "14px " + F_UI;
          wrap(c.intro, W / 2, H / 2 - 12, W - 80, 20);
          ctx.fillStyle = "#fff";
          ctx.font = "18px " + F_IMPACT;
          if (Math.floor(now() / 450) % 2)
            ctx.fillText("TAP / SPACE TO FIGHT", W / 2, H / 2 + 130);
        }
        function drawCenter(title, sub, col) {
          ctx.fillStyle = "rgba(6,14,24,.72)";
          ctx.fillRect(0, H / 2 - 110, W, 220);
          ctx.textAlign = "center";
          ctx.fillStyle = col;
          ctx.font = "36px " + F_TITLE;
          wrap(title, W / 2, H / 2 - 16, W - 50, 38);
          ctx.fillStyle = "rgba(255,255,255,.85)";
          ctx.font = "16px " + F_UI;
          if (Math.floor(now() / 450) % 2) ctx.fillText(sub, W / 2, H / 2 + 50);
        }
        function wrap(text, cx, y, maxw, lh) {
          const words = text.split(" ");
          let line = "",
            yy = y;
          for (const w of words) {
            const test = line ? line + " " + w : w;
            if (ctx.measureText(test).width > maxw && line) {
              ctx.fillText(line, cx, yy);
              line = w;
              yy += lh;
            } else line = test;
          }
          ctx.fillText(line, cx, yy);
        }
        function wrapL(text, x, y, maxw, lh) {
          const words = text.split(" ");
          let line = "",
            yy = y;
          ctx.textAlign = "left";
          for (const w of words) {
            const t = line ? line + " " + w : w;
            if (ctx.measureText(t).width > maxw && line) {
              ctx.fillText(line, x, yy);
              line = w;
              yy += lh;
            } else line = t;
          }
          ctx.fillText(line, x, yy);
          return yy;
        }
        function drawCard(x, y, w, h, o) {
          const accent = o.accent,
            hasArt = o.fighter != null || o.icon,
            bodyW = hasArt ? w - 150 : w - 32;
          ctx.save();
          rr(x, y, w, h, 14);
          ctx.fillStyle = "rgba(10,18,30,.94)";
          ctx.fill();
          ctx.lineWidth = 3;
          ctx.strokeStyle = accent;
          ctx.stroke();
          ctx.save();
          rr(x, y, w, 46, 14);
          ctx.clip();
          ctx.globalAlpha = 0.92;
          ctx.fillStyle = accent;
          ctx.fillRect(x, y, w, 46);
          ctx.restore();
          ctx.textAlign = "left";
          ctx.fillStyle = "#0a0716";
          ctx.font = "24px " + F_TITLE;
          ctx.fillText(o.title, x + 16, y + 33);
          ctx.textAlign = "right";
          ctx.fillStyle = "#0a0716";
          ctx.font = "18px " + F_IMPACT;
          ctx.fillText(o.perk, x + w - 14, y + 32);
          ctx.fillStyle = "rgba(255,255,255,.9)";
          ctx.font = "14px " + F_UI;
          wrapL(o.body, x + 16, y + 74, bodyW, 20);
          if (o.fighter != null) {
            drawFighter(x + w - 60, y + h * 0.64, 1.9, o.fighter);
          } else if (o.icon) {
            ctx.save();
            ctx.font = "46px system-ui";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#fff";
            ctx.fillText(o.icon, x + w - 58, y + h * 0.6);
            ctx.textBaseline = "alphabetic";
            ctx.restore();
          }
          ctx.textAlign = "left";
          ctx.fillStyle = accent;
          ctx.font = "14px " + F_IMPACT;
          ctx.fillText("[" + o.idx + "]  tap to pick", x + 16, y + h - 16);
          ctx.restore();
        }
        function drawSelect() {
          ctx.textAlign = "center";
          ctx.fillStyle = "#fff";
          ctx.font = "30px " + F_TITLE;
          ctx.fillText("CHOOSE YOUR FIGHTER", W / 2, 118);
          drawCard(30, 160, W - 60, 240, {
            accent: CHARS[0].accent,
            title: CHARS[0].name,
            perk: CHARS[0].perk,
            body: CHARS[0].story,
            idx: 1,
            fighter: 0,
          });
          drawCard(30, 430, W - 60, 240, {
            accent: CHARS[1].accent,
            title: CHARS[1].name,
            perk: CHARS[1].perk,
            body: CHARS[1].story,
            idx: 2,
            fighter: 1,
          });
          ctx.textAlign = "center";
          ctx.fillStyle = "rgba(255,255,255,.6)";
          ctx.font = "13px " + F_UI;
          ctx.fillText("Tap a card  ·  or press 1 / 2", W / 2, 706);
          ctx.globalAlpha = 0.28;
          ctx.fillStyle = "#fff";
          ctx.font = "12px " + F_UI;
          ctx.textAlign = "right";
          ctx.fillText("built by Colin", W - 12, H - 8);
          ctx.globalAlpha = 1;
        }
        function drawLevelUp() {
          ctx.fillStyle = "rgba(6,12,22,.92)";
          ctx.fillRect(0, 0, W, H);
          ctx.textAlign = "center";
          ctx.fillStyle = "#ffe08a";
          ctx.font = "32px " + F_TITLE;
          ctx.fillText("LEVEL UP!", W / 2, 96);
          ctx.fillStyle = "rgba(255,255,255,.8)";
          ctx.font = "15px " + F_UI;
          ctx.fillText("Pick your gear for the next fight", W / 2, 124);
          if (offer[0])
            drawCard(30, 160, W - 60, 240, {
              accent: "#8effb4",
              title: offer[0].name,
              perk: offer[0].perk,
              body: offer[0].desc,
              idx: 1,
              icon: offer[0].icon,
            });
          if (offer[1])
            drawCard(30, 430, W - 60, 240, {
              accent: "#7fd0ff",
              title: offer[1].name,
              perk: offer[1].perk,
              body: offer[1].desc,
              idx: 2,
              icon: offer[1].icon,
            });
          ctx.textAlign = "center";
          ctx.fillStyle = "rgba(255,255,255,.6)";
          ctx.font = "13px " + F_UI;
          ctx.fillText("Tap a card  ·  or press 1 / 2", W / 2, 706);
        }
        function rr(x, y, w, h, r) {
          r = Math.min(r, w / 2, h / 2);
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.arcTo(x + w, y, x + w, y + h, r);
          ctx.arcTo(x + w, y + h, x, y + h, r);
          ctx.arcTo(x, y + h, x, y, r);
          ctx.arcTo(x, y, x + w, y, r);
          ctx.closePath();
        }
        if (!CanvasRenderingContext2D.prototype.roundRect) {
          CanvasRenderingContext2D.prototype.roundRect = function (
            x,
            y,
            w,
            h,
            r,
          ) {
            r = Math.min(r, w / 2, h / 2);
            this.beginPath();
            this.moveTo(x + r, y);
            this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r);
            this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r);
            this.closePath();
            return this;
          };
        }

        applyPerks();
        loop();
      })();
    </script>
  </body>
